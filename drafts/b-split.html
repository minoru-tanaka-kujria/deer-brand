<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>案B — 左右分割型</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap" rel="stylesheet" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans JP', sans-serif; background: #0A0A0B; color: #F5F5F0; }

.hero {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
}
.hero-left {
  display: flex; flex-direction: column; justify-content: center;
  padding: 4rem 3.5rem;
  position: relative;
}
.hero-left::after {
  content: '';
  position: absolute; top: 20%; right: 0; bottom: 20%;
  width: 1px;
  background: linear-gradient(180deg, transparent, #C8A96E33, transparent);
}
.hero-logo {
  font-size: 0.8rem; font-weight: 600; letter-spacing: 6px;
  color: #8B7442; margin-bottom: 2.5rem;
}
.hero-tag {
  display: inline-flex; align-items: center; gap: 0.4rem;
  background: rgba(200,169,110,0.1); border: 1px solid rgba(200,169,110,0.2);
  border-radius: 100px; padding: 0.4rem 1rem;
  font-size: 0.72rem; color: #E8D5A8; font-weight: 600; letter-spacing: 1px;
  margin-bottom: 1.5rem; width: fit-content;
}
.hero-tag-dot { width: 6px; height: 6px; background: #C8A96E; border-radius: 50%; }
.hero-main {
  font-size: clamp(2rem, 4vw, 3.2rem);
  font-weight: 900;
  line-height: 1.4;
  margin-bottom: 1.5rem;
}
.hero-main .gold { color: #C8A96E; }
.hero-desc {
  font-size: 1rem; color: #8A8A8E; line-height: 2; margin-bottom: 2rem;
  font-weight: 400;
}
.hero-steps {
  display: flex; gap: 1.5rem; margin-bottom: 2.5rem;
}
.step {
  display: flex; align-items: center; gap: 0.6rem;
}
.step-num {
  width: 2rem; height: 2rem; border-radius: 50%;
  background: #C8A96E; color: #0A0A0B;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
}
.step-text { font-size: 0.82rem; font-weight: 500; color: #B5B5B8; }
.hero-btn {
  display: inline-block;
  background: #C8A96E; color: #0A0A0B;
  font-size: 1rem; font-weight: 700;
  padding: 1rem 2.5rem; border-radius: 14px;
  border: none; cursor: pointer;
  transition: all 0.3s;
}
.hero-btn:hover { background: #E8D5A8; }
.hero-note { font-size: 0.78rem; color: #8A8A8E; margin-top: 0.8rem; }

.hero-right {
  position: relative; overflow: hidden;
}
.hero-right img {
  width: 100%; height: 100%; object-fit: cover;
}
.hero-right::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, rgba(10,10,11,0.3) 0%, transparent 30%);
}

/* 右下のフローティングカード */
.float-card {
  position: absolute; bottom: 2rem; right: 2rem; z-index: 2;
  background: rgba(20,20,22,0.9); backdrop-filter: blur(16px);
  border: 1px solid #2A2A2E; border-radius: 16px;
  padding: 1.2rem 1.5rem; max-width: 240px;
}
.float-card-title { font-size: 0.82rem; font-weight: 700; color: #C8A96E; margin-bottom: 0.3rem; }
.float-card-text { font-size: 0.75rem; color: #8A8A8E; line-height: 1.5; }

.label { position: fixed; top: 1rem; left: 1rem; background: #C8A96E; color: #0A0A0B; padding: 0.4rem 1rem; border-radius: 8px; font-size: 0.8rem; font-weight: 700; z-index: 100; }

@media (max-width: 768px) {
  .hero { grid-template-columns: 1fr; }
  .hero-right { height: 50vh; }
  .hero-left { padding: 3rem 1.5rem; }
  .hero-left::after { display: none; }
}
</style>
</head>
<body>
<div class="label">案B：左右分割型</div>
<section class="hero">
  <div class="hero-left">
    <div class="hero-logo">D E E R</div>
    <div class="hero-tag"><span class="hero-tag-dot"></span>愛犬グッズ専門</div>
    <h1 class="hero-main">
      うちの子の写真で<br>
      <span class="gold">世界にひとつだけ</span>の<br>
      Tシャツをつくろう。
    </h1>
    <p class="hero-desc">
      写真をアップロードするだけで、AIが自動で<br>
      油絵・水彩画・ポップアートなど8種類のアートに変換。<br>
      Tシャツ、トートバッグ、パーカーにプリントしてお届けします。
    </p>
    <div class="hero-steps">
      <div class="step"><div class="step-num">1</div><div class="step-text">写真をアップ</div></div>
      <div class="step"><div class="step-num">2</div><div class="step-text">スタイルを選ぶ</div></div>
      <div class="step"><div class="step-num">3</div><div class="step-text">届く！</div></div>
    </div>
    <button class="hero-btn">無料でためしてみる →</button>
    <p class="hero-note">AI変換は何度でも無料。決済は注文時のみ。</p>
  </div>
  <div class="hero-right">
    <img src="https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=1200&q=85&auto=format&fit=crop" alt="犬の写真" />
    <div class="float-card">
      <div class="float-card-title">✨ 全8スタイル対応</div>
      <div class="float-card-text">油絵、水墨画、水彩画、モノクロ、ポップアート、未来風、線画、コラージュ</div>
    </div>
  </div>
</section>
</body>
</html>
