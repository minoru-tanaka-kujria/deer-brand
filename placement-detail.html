      // ============================================================
      const params = new URLSearchParams(window.location.search);
      const productId = params.get("product") || "hoodie";
      const placementId = params.get("placement") || "left-chest";
      const product = PRODUCTS[productId] || PRODUCTS["hoodie"];
      const placement =
        product.placements[placementId] ||
        product.placements[Object.keys(product.placements)[0]];
      if (!PRODUCTS[productId] || !product.placements[placementId]) {
        // 不正パラメータ時はトップへリダイレクト
        window.location.href = "index.html";
      }
      let selectedColor = product.colors[0].id;
      let showingMore = true;

      // Set hero
      document.getElementById("heroTitle").textContent = product.name;
      document.getElementById("heroPlacement").textContent = placement.name;
      document.getElementById("heroPrice").textContent =
        "¥" + placement.price.toLocaleString();
      document.title = product.name + " " + placement.name + " — Deer";

      // Set CTA link and label
      const ctaBtn = document.getElementById("ctaBtn");
      ctaBtn.href = "upload?item=" + productId + "&placement=" + placementId;
      ctaBtn.textContent =
        product.name + "【" + placement.name + "】でオーダーする";

      // Build colors
      function buildColors() {
        const container = document.getElementById("colorSwatches");
        container.innerHTML = product.colors
          .map(
            (c) =>
              '<div style="text-align:center">' +
              '<div class="color-sw' +
              (c.id === selectedColor ? " active" : "") +
              '" style="background:' +
              c.hex +
              '" onclick="selectColor(\'' +
              c.id +
              "')\">" +
              "</div>" +
              '<span class="cname">' +
              c.name +
              "</span>" +
              "</div>",
          )
          .join("");
      }

      function selectColor(colorId) {
        selectedColor = colorId;
        buildColors();
        // In future: swap images to show selected color
      }

      // Style ID → art image mapping (フォールバック用。存在しない画像のみ指定)
      const STYLE_ART_IMG = {
        silhouette: "img/styles/mono-hicon.png",
      };

      // Build samples
      function buildSamples() {
        const grid = document.getElementById("samplesGrid");
        const styles = showingMore
          ? [...STYLES_INITIAL, ...STYLES_MORE]
          : STYLES_INITIAL;

        // placementId → 実ファイル名部分のマッピング
        const PLACEMENT_FILE_MAP = {
          "back-print": "back",
          "left-chest": "leftchest",
          center: "center",
          wrap: "wrap",
          leftchest: "leftchest",
          back: "back",
        };
        // styleId → 実ファイル名部分のマッピング（8種類の実画像にフォールバック）
        const STYLE_MOCKUP_MAP = {
          "oil-impressionism": "impressionism",
          "oil-baroque": "oil-baroque",
          "oil-renaissance": "oil-baroque",
          "oil-expressionism": "impressionism",
          "wc-loose": "watercolor",
          "wc-botanical": "wc-botanical",
          "wc-wet": "watercolor",
          "ink-sumie": "sumie",
          "ink-nanga": "sumie",
          "pop-warhol": "popart",
          "pop-comic": "popart",
          "pop-graffiti": "popart",
          "mono-hicon": "mono-charcoal",
          "mono-charcoal": "mono-charcoal",
          "mono-noir": "mono-charcoal",
          "future-cyber": "mono-charcoal",
          "future-neon": "mono-charcoal",
          "future-glitch": "mono-charcoal",
          "line-oneline": "line-oneline",
          "line-minimal": "line-oneline",
          "collage-mixed": "wc-botanical",
          "collage-papercut": "wc-botanical",
          silhouette: "mono-charcoal",
        };

        grid.innerHTML = styles
          .map((s, i) => {
            const placementFile =
              PLACEMENT_FILE_MAP[placementId] || placementId.replace(/-/g, "");
            const styleFile = STYLE_MOCKUP_MAP[s.id] || s.id;
            const mockupPath =
              "img/placement/detail/" +
              productId +
              "-" +
              placementFile +
              "-" +
              styleFile +
              ".png";
            const artPath =
              STYLE_ART_IMG[s.id] || "img/styles/" + s.id + ".png";
            return (
              '<div class="sample-card fade-up" style="transition-delay:' +
              i * 0.08 +
              's"' +
              " onclick=\"location.href='upload?item=" +
              productId +
              "&placement=" +
              placementId +
              "&style=" +
              s.id +
              "&color=" +
              selectedColor +
              "'\">" +
              '<div class="card-img-wrap">' +
              '<div class="img-half">' +
              '<img src="' +
              mockupPath +
              '" alt="' +
              s.name +
              ' 着用イメージ" loading="lazy">' +
              '<span class="img-label">着用イメージ</span>' +
              "</div>" +
              '<div class="img-half">' +
              '<img src="' +
              artPath +
              '" alt="' +
              s.name +
              ' スタイル" loading="lazy">' +
              '<span class="img-label">アートスタイル</span>' +
              "</div>" +
              '<div class="card-overlay">' +
              '<button class="order-btn">このスタイルでオーダー</button>' +
              "</div>" +
              "</div>" +
              '<div class="card-body">' +
              '<div class="style-name">' +
              s.name +
              "</div>" +
              '<div class="style-sub">' +
              s.nameEn +
              "</div>" +
              '<div class="tags">' +
              s.tags.map((t) => '<span class="tag">' + t + "</span>").join("") +
              "</div>" +
              "</div>" +
              "</div>"
            );
          })
          .join("");

        document.getElementById("moreBtnWrap").style.display = showingMore
          ? "none"
          : "block";

        // Trigger animations
        requestAnimationFrame(() => {
          const observer = new IntersectionObserver(
            (entries) => {
              entries.forEach((e) => {
                if (e.isIntersecting) {
                  e.target.classList.add("visible");
                  observer.unobserve(e.target);
                }
              });
            },
            { threshold: 0, rootMargin: "100px" },
          );
          document
            .querySelectorAll(".fade-up")
            .forEach((el) => observer.observe(el));
        });
      }

      document.getElementById("moreBtn").addEventListener("click", () => {
        showingMore = true;
        buildSamples();
      });

      // Init
      buildColors();
      buildSamples();
    </script>
  </body>
</html>
