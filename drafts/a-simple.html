<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>案A — シンプル直球型</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap" rel="stylesheet" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans JP', sans-serif; background: #0A0A0B; color: #F5F5F0; }

.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.hero-img {
  position: absolute; inset: 0;
  background: url('https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=1920&q=85&auto=format&fit=crop') center/cover no-repeat;
}
.hero-img::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(10,10,11,0.55);
}
.hero-content {
  position: relative; z-index: 2;
  text-align: center;
  padding: 2rem;
  max-width: 800px;
}
.hero-logo {
  font-size: 0.85rem; font-weight: 600; letter-spacing: 6px;
  color: #C8A96E; margin-bottom: 2rem;
}
.hero-main {
  font-size: clamp(2.2rem, 6vw, 4rem);
  font-weight: 900;
  line-height: 1.3;
  margin-bottom: 1.5rem;
}
.hero-main .accent {
  color: #C8A96E;
}
.hero-sub {
  font-size: clamp(1rem, 2.5vw, 1.3rem);
  font-weight: 400;
  color: rgba(245,245,240,0.8);
  line-height: 1.8;
  margin-bottom: 2.5rem;
}
.hero-btn {
  display: inline-block;
  background: #C8A96E; color: #0A0A0B;
  font-size: 1.1rem; font-weight: 700;
  padding: 1rem 3rem; border-radius: 14px;
  border: none; cursor: pointer;
  transition: all 0.3s;
}
.hero-btn:hover { background: #E8D5A8; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(200,169,110,0.4); }
.hero-note { font-size: 0.8rem; color: rgba(245,245,240,0.5); margin-top: 1rem; }
.label { position: fixed; top: 1rem; left: 1rem; background: #C8A96E; color: #0A0A0B; padding: 0.4rem 1rem; border-radius: 8px; font-size: 0.8rem; font-weight: 700; z-index: 100; }
</style>
</head>
<body>
<div class="label">案A：シンプル直球型</div>
<section class="hero">
  <div class="hero-img"></div>
  <div class="hero-content">
    <div class="hero-logo">D E E R</div>
    <h1 class="hero-main">
      愛犬の写真を<br>
      <span class="accent">アート</span>に変えて<br>
      グッズにする。
    </h1>
    <p class="hero-sub">
      スマホで写真をアップするだけ。<br>
      AIが油絵・水彩画・ポップアート風に自動変換。<br>
      Tシャツやトートバッグにして、5〜7日でお届け。
    </p>
    <button class="hero-btn">無料でためしてみる →</button>
    <p class="hero-note">AI変換は無料。お支払いは注文時だけ。</p>
  </div>
</section>
</body>
</html>
