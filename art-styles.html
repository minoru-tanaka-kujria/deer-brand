      :root {
        --ivory: #faf7f2;
        --cream: #f5ede3;
        --warm: #ede4d8;
        --gold: #c4a265;
        --gold-light: #d4b87a;
        --terracotta: #c4836a;
        --terracotta-soft: #d9a28e;
        --charcoal: #2c2824;
        --charcoal-light: #4a453f;
        --text: #2c2824;
        --text-mid: #6b6460;
        --text-light: #9b9490;
        --white: #ffffff;
        --border: #e8dfd5;
        --serif: "Cormorant Garamond", "Georgia", serif;
        --sans: "Zen Maru Gothic", sans-serif;
      }
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
      }
      body {
        font-family: var(--sans);
        background: var(--ivory);
        color: var(--text);
        line-height: 1.8;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      img {
        display: block;
        max-width: 100%;
      }

      /* NAV */
      .nav {
        background: var(--charcoal);
        padding: 0 2rem;
        height: 3.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .nav-logo {
        font-family: var(--serif);
        font-size: 1.3rem;
        font-weight: 300;
        letter-spacing: 6px;
        color: var(--cream);
        text-transform: uppercase;
      }
      .nav-back {
        font-size: 0.8rem;
        color: var(--text-light);
        display: flex;
        align-items: center;
        gap: 0.4rem;
        transition: color 0.3s;
      }
      .nav-back:hover {
        color: var(--cream);
      }

      /* HERO */
      .page-hero {
        background: linear-gradient(
          180deg,
          var(--charcoal) 0%,
          var(--charcoal-light) 40%,
          var(--warm) 100%
        );
        padding: 4rem 2rem 3rem;
        text-align: center;
      }
      .page-hero h1 {
        font-family: var(--serif);
        font-size: 2.4rem;
        font-weight: 300;
        color: var(--cream);
        letter-spacing: 4px;
        margin-bottom: 0.5rem;
      }
      .page-hero p {
        font-size: 0.88rem;
        color: var(--text-light);
        max-width: 500px;
        margin: 0 auto;
      }

      /* FILTER */
      .filter-bar {
        background: var(--cream);
        border-bottom: 1px solid var(--border);
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        flex-wrap: wrap;
        position: sticky;
        top: 0;
        z-index: 50;
      }
      .filter-btn {
        padding: 0.45rem 1.1rem;
        border: 1.5px solid var(--border);
        border-radius: 100px;
        background: var(--white);
        font-family: var(--sans);
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-mid);
        cursor: pointer;
        transition: all 0.3s;
        white-space: nowrap;
      }
      .filter-btn:hover {
        border-color: var(--gold-light);
        color: var(--charcoal);
      }
      .filter-btn.active {
        background: var(--charcoal);
        border-color: var(--charcoal);
        color: var(--white);
      }

      /* GRID */
      .styles-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2.5rem 2rem 4rem;
      }
      .category-title {
        font-family: var(--serif);
        font-size: 1.4rem;
        font-weight: 400;
        color: var(--charcoal);
        letter-spacing: 2px;
        margin-bottom: 1.2rem;
        padding-bottom: 0.6rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 0.8rem;
      }
      .category-title .cat-num {
        font-size: 0.7rem;
        font-weight: 700;
        color: var(--white);
        background: var(--terracotta);
        width: 1.6rem;
        height: 1.6rem;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .category-section {
        margin-bottom: 3rem;
      }

      .styles-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 1.2rem;
      }
      .style-card {
        background: var(--white);
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid var(--border);
        transition: all 0.4s;
        cursor: pointer;
        position: relative;
      }
      .style-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 32px rgba(44, 40, 36, 0.1);
        border-color: var(--gold-light);
      }
      .style-card .card-img {
        width: 100%;
        aspect-ratio: 4/3;
        object-fit: cover;
        transition: transform 0.5s;
      }
      .style-card:hover .card-img {
        transform: scale(1.03);
      }
      .card-dual-imgs {
        display: flex;
        aspect-ratio: 4/3;
        overflow: hidden;
      }
      .card-dual-imgs .dual-img {
        flex: 1;
        position: relative;
        overflow: hidden;
      }
      .card-dual-imgs .dual-img + .dual-img {
        border-left: 1.5px solid rgba(255,255,255,0.5);
      }
      .card-dual-imgs .dual-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s;
        display: block;
      }
      .style-card:hover .card-dual-imgs .dual-img img {
        transform: scale(1.04);
      }
      .dual-img-label {
        position: absolute;
        bottom: 6px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.55rem;
        font-weight: 600;
        color: #fff;
        background: rgba(0,0,0,0.52);
        padding: 0.15rem 0.5rem;
        border-radius: 100px;
        white-space: nowrap;
        letter-spacing: 0.3px;
        pointer-events: none;
      }
      .style-card .card-img-wrap {
        overflow: hidden;
        position: relative;
      }
      .style-card .card-img-wrap .overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          transparent 50%,
          rgba(44, 40, 36, 0.5) 100%
        );
        opacity: 0;
        transition: opacity 0.3s;
      }
      .style-card:hover .card-img-wrap .overlay {
        opacity: 1;
      }
      .style-card .select-btn {
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%) translateY(8px);
        opacity: 0;
        padding: 0.5rem 1.5rem;
        background: var(--terracotta);
        color: var(--white);
        border: none;
        border-radius: 100px;
        font-family: var(--sans);
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: all 0.3s;
        white-space: nowrap;
      }
      .style-card:hover .select-btn {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .card-body {
        padding: 1rem 1.2rem 1.2rem;
      }
      .card-body .style-name {
        font-size: 0.92rem;
        font-weight: 700;
        color: var(--charcoal);
        margin-bottom: 0.1rem;
      }
      .card-body .style-name-en {
        font-size: 0.7rem;
        color: var(--text-light);
        font-style: italic;
        font-family: var(--serif);
        letter-spacing: 0.5px;
      }
      .card-body .style-desc {
        font-size: 0.74rem;
        color: var(--text-mid);
        margin-top: 0.5rem;
        line-height: 1.6;
      }
      .card-body .tags {
        margin-top: 0.5rem;
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
      }
      .card-body .tag {
        font-size: 0.6rem;
        padding: 0.15rem 0.5rem;
        background: rgba(196, 162, 101, 0.12);
        color: var(--gold);
        border-radius: 100px;
        font-weight: 500;
      }

      /* CTA */
      .bottom-cta {
        background: var(--charcoal);
        text-align: center;
        padding: 3rem 2rem;
      }
      .bottom-cta h2 {
        font-family: var(--serif);
        font-size: 1.6rem;
        font-weight: 300;
        color: var(--cream);
        margin-bottom: 0.5rem;
      }
      .bottom-cta p {
        font-size: 0.82rem;
        color: var(--text-light);
        margin-bottom: 1.5rem;
      }
      .bottom-cta .cta-btn {
        display: inline-block;
        padding: 0.9rem 2.5rem;
        background: var(--terracotta);
        color: var(--white);
        border-radius: 100px;
        font-size: 0.88rem;
        font-weight: 700;
        letter-spacing: 1px;
        transition: all 0.3s;
      }
      .bottom-cta .cta-btn:hover {
        background: #b3725c;
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(196, 131, 106, 0.3);
      }

      /* FADE */
      .fade-up {
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 0.6s,
          transform 0.6s;
      }
      .fade-up.visible {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 640px) {
        .nav {
          padding: 0 1rem;
        }
        .page-hero {
          padding: 3rem 1.2rem 2rem;
        }
        .page-hero h1 {
          font-size: 1.6rem;
        }
        .filter-bar {
          padding: 0.8rem 1rem;
          gap: 0.4rem;
        }
        .filter-btn {
          font-size: 0.68rem;
          padding: 0.35rem 0.8rem;
        }
        .styles-container {
          padding: 1.5rem 1rem 3rem;
        }
        .styles-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 0.8rem;
        }
        .card-body {
          padding: 0.7rem 0.8rem 0.9rem;
        }
        .card-body .style-desc {
          display: none;
        }
      }
    </style>
  </head>

              desc: "切り絵のような平面的でグラフィカルなスタイル",
              tags: ["グラフィック", "手作り感"],
            },
          ],
        },
        {
          category: "silhouette",
          catLabel: "シルエット",
          items: [
            {
              id: "silhouette",
              name: "シルエット",
              nameEn: "Silhouette",
              img: "img/styles/mono-hicon.png",
              modelImg: "img/lookbook/tote-black-impressionism.png",
              desc: "愛犬の輪郭を美しいシルエットで表現するミニマルなスタイル",
              tags: ["ミニマル", "モダン"],
            },
          ],
        },
      ];

      // Build page
      function buildStyles(filterCat) {
        const container = document.getElementById("stylesContainer");
        const filtered =
          filterCat === "all"
            ? STYLES
            : STYLES.filter((s) => s.category === filterCat);

        container.innerHTML = filtered
          .map(
            (cat, ci) => `
          <section class="category-section" data-cat="${cat.category}">
            <h2 class="category-title fade-up">
              <span class="cat-num">${ci + 1}</span>
              ${cat.catLabel}
            </h2>
            <div class="styles-grid">
              ${cat.items
                .map(
                  (item, ii) => `
                <div class="style-card fade-up" style="transition-delay:${ii * 0.08}s" onclick="location.href='upload?style=${item.id}'">
                  <div class="card-img-wrap">
                    <div class="card-dual-imgs">
                      <div class="dual-img">
                        <img src="${item.modelImg}" alt="着用イメージ" loading="lazy">
                        <span class="dual-img-label">着用イメージ</span>
                      </div>
                      <div class="dual-img">
                        <img src="${item.img}" alt="${item.name}" loading="lazy">
                        <span class="dual-img-label">アートスタイル</span>
                      </div>
                    </div>
                    <div class="overlay"></div>
                    <button class="select-btn">このスタイルで作る</button>
                  </div>
                  <div class="card-body">
                    <div class="style-name">${item.name}</div>
                    <div class="style-name-en">${item.nameEn}</div>
                    <p class="style-desc">${item.desc}</p>
                    <div class="tags">
                      ${item.tags.map((t) => `<span class="tag">${t}</span>`).join("")}
                    </div>
                  </div>
                </div>`,
                )
                .join("")}
            </div>
          </section>`,
          )
          .join("");

        // Trigger animations
        requestAnimationFrame(() => {
          const observer = new IntersectionObserver(
            (entries) => {
              entries.forEach((entry) => {
                if (entry.isIntersecting) {
                  entry.target.classList.add("visible");
                  observer.unobserve(entry.target);
                }
              });
            },
            { threshold: 0.05, rootMargin: "0px 0px 100px 0px" },
          );
          document
            .querySelectorAll(".fade-up")
            .forEach((el) => observer.observe(el));
        });
      }

      // Filter buttons
      document.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".filter-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          buildStyles(btn.dataset.filter);
        });
      });

      // Init
      buildStyles("all");
    </script>
  </body>
</html>
