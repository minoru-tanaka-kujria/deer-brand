<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>APNG Test</title>
<style>
body { background: #333; display: flex; flex-direction: column; align-items: center; padding: 40px; font-family: sans-serif; color: #fff; }
.row { display: flex; gap: 30px; margin: 20px 0; }
.box { text-align: center; }
.box p { font-size: 13px; color: #aaa; margin-top: 8px; }
img { width: 200px; height: 169px; }
.on-white { background: #fff; border-radius: 12px; padding: 10px; }
.on-green { background: #7BB36E; border-radius: 12px; padding: 10px; }
.on-dark { background: #1a1a2e; border-radius: 12px; padding: 10px; }
</style>
</head>
<body>
<h2>APNG Animation Test - shepherd-ohayou</h2>
<p>10 frames / 292.4KB / 320x270 / 80 colors / Replicate remove-bg</p>
<div class="row">
  <div class="box">
    <div class="on-white"><img src="shepherd-ohayou-animated.png"></div>
    <p>White BG (LINE chat)</p>
  </div>
  <div class="box">
    <div class="on-green"><img src="shepherd-ohayou-animated.png"></div>
    <p>Green BG (LINE bubble)</p>
  </div>
  <div class="box">
    <div class="on-dark"><img src="shepherd-ohayou-animated.png"></div>
    <p>Dark BG</p>
  </div>
</div>
</body>
</html>
