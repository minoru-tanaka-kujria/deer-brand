<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>LINE Stamp Preview</title>
<style>
body { background: #222; color: #fff; font-family: sans-serif; padding: 20px; }
h1 { text-align: center; }
.sub { text-align: center; color: #aaa; font-size: 14px; margin-bottom: 24px; }
h2 { color: #ccc; margin: 32px 0 12px; text-align: center; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; max-width: 1100px; margin: 0 auto; }
.card { background: #333; border-radius: 12px; padding: 12px; text-align: center; }
.card img, .card video { width: 100%; border-radius: 8px; }
.label { font-size: 15px; font-weight: bold; margin-top: 6px; }
.size { font-size: 11px; color: #666; }
.bg-row { display: flex; gap: 16px; justify-content: center; margin: 20px auto; }
.bg-card { border-radius: 12px; padding: 16px; text-align: center; }
.bg-card img { width: 200px; }
.bg-card p { font-size: 12px; color: #aaa; margin-top: 4px; }
</style></head>
<body>
<h1>LINE Animated Stamp 8-Set</h1>
<p class="sub">Rounded rect frame / Seedance 2.0 / 6 frames / APNG</p>
